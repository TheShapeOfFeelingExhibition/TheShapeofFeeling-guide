<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exhibition E-Brochure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="pb-20">

    <header class="p-8 text-center border-b border-zinc-800">
        <h1 class="text-4xl font-light tracking-widest uppercase" The Shape Of Feeling
        <p class="text-zinc-500 mt-2">Interactive Exhibition Guide</p>
    </header>

    <section class="p-6">
        <h2 class="text-xl font-semibold mb-6 border-l-4 border-white pl-4">Featured Artists</h2>
        
        <div class="glass rounded-2xl overflow-hidden mb-8">
            <img src="https://via.placeholder.com/600x400" alt="Artist Name" class="w-full h-48 object-cover">
            <div class="p-6">
                <h3 class="text-2xl font-medium" Ariann Aleah
                <p class="text-zinc-400 text-sm italic mb-4">Sculpture & Installation</p>
                <p class="text-zinc-300 text-sm leading-relaxed mb-6">
                    Write the artist's biography here. Mention their inspiration, background, and what they hope to achieve with their work.
                </p>
                <div class="flex space-x-4">
                    <a href="#" class="text-sm border-b border-white pb-1">Website</a>
                    <a href="#" class="text-sm border-b border-white pb-1">Instagram</a>
                </div>
            </div>
        </div>
        
        </section>

    <section class="p-6 bg-zinc-900/50">
        <h2 class="text-xl font-semibold mb-6 border-l-4 border-white pl-4">The Collection</h2>
        
        <div class="mb-10">
            <div class="flex justify-between items-end mb-2">
                <div>
                    <h4 class="text-lg font-medium">"Midnight Echo"</h4>
                    <p class="text-zinc-500 text-xs uppercase tracking-tighter">Oil on Canvas, 2026</p>
                </div>
            </div>
            
            <div class="relative group rounded-xl overflow-hidden aspect-video bg-zinc-800 flex items-center justify-center">
                <p class="text-zinc-500 text-sm">Progress Video/Photos Loop</p> 
            </div>
        </div>
    </section>

</body>
</html>
